name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          ULTRABUILD_HOME: ${{ runner.temp }}/ultrabuild-home-test
      - run: npm run e2e
        env:
          ULTRABUILD_HOME: ${{ runner.temp }}/ultrabuild-home-e2e
      - run: npm run package:all
      - run: npm run smoke:release
        env:
          ULTRABUILD_HOME: ${{ runner.temp }}/ultrabuild-home-release
      - name: Upload release bundles
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: ultrabuild-release-bundles
          path: release/*
