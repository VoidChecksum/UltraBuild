name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run e2e
      - run: npm run package:all
      - run: npm run smoke:release
      - name: Publish GitHub release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
